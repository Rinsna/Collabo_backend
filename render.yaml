services:
  - type: web
    name: collabo-backend
    env: python
    runtime: python
    buildCommand: "bash build.sh"
    startCommand: "gunicorn influencer_platform.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: DB_PATH
        value: /data/db.sqlite3
    disk:
      name: collabo-data
      mountPath: /data
      sizeGB: 1
